<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lumis Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
font-family: Arial;
background:#0f0f0f;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:#1c1c1c;
padding:30px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#00ff88;
border:none;
border-radius:5px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>Lumis</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<script src="app.js"></script>

</body>
</html>
